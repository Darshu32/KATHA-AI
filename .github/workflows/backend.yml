# Stage 0 CI skeleton.
# Currently runs:
#   - lint (ruff)
#   - format check (ruff format --check)
#   - typecheck (mypy)
#   - unit tests (no DB / Redis required)
#
# Stage 1+ will add an integration job that spins up postgres + redis
# and runs migrations + integration tests.

name: backend

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  quality:
    name: lint · format · types · unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy app
        continue-on-error: true  # Stage 0: don't block on type errors yet

      - name: Pytest (unit only)
        env:
          ENVIRONMENT: dev
          DEBUG: "true"
        run: pytest tests/unit -ra
